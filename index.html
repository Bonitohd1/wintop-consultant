<style>
 :root{ --pri:#1D4ED8; --pri-dark:#10357A; --pri-soft:#E8F0FE; --health:#0F9A6A; --health-soft:#DCF3E8; --warm:#E0533D; --warm-soft:#FDECEA; --gold:#C2691A; --gold-soft:#FFF3E6; --ink:#0F1B2D; --muted:#5B6B80; --faint:#94A3B8; --bg:#F6F8FC; --card:#fff; --line:#EEF2F7; --line2:#E2E8F0; --ok:#0F9A6A; --warn:#C2691A; --bad:#B4302A; --rc:20px; --rk:12px; --sh:0 2px 10px rgba(20,40,80,.05); --she:0 6px 20px rgba(37,99,235,.14); --fh:"Be Vietnam Pro",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; --fb:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif; }
 *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
 body{ margin:0; font-family:var(--fb); background:var(--bg); color:var(--ink); padding-bottom:76px; line-height:1.5; }
 .wrap{ max-width:560px; margin:0 auto; padding:14px; }
 h1,h2,h3{ font-family:var(--fh); font-weight:600; }
 .top{ background:linear-gradient(135deg,var(--pri),var(--pri-dark)); color:#fff; padding:12px 16px; position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:11px; }
 .top .av{ width:42px; height:42px; border-radius:14px; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
 .top .av svg{ width:34px; height:34px; }
 .top h1{ font-size:13.5px; margin:0; font-weight:600; }
 .top p{ margin:1px 0 0; font-size:10px; opacity:.85; }
 h2{ font-size:17px; margin:4px 2px 12px; }
 .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--rc); padding:15px; margin-bottom:12px; box-shadow:var(--sh); }
 label{ display:block; font-size:12.5px; font-weight:600; margin:12px 0 6px; color:#334155; }
 input,select,textarea{ width:100%; padding:12px; border:1px solid var(--line2); border-radius:var(--rk); font-size:15px; background:#fff; color:var(--ink); font-family:var(--fb); }
 input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--pri); box-shadow:0 0 0 3px rgba(29,78,216,.13); }
 .row{ display:flex; gap:10px; } .row>*{ flex:1; }
 .chips{ display:flex; flex-wrap:wrap; gap:8px; }
 .chip{ padding:9px 14px; border:1.5px solid var(--line2); border-radius:999px; font-size:13px; background:#fff; cursor:pointer; user-select:none; color:#334155; transition:.12s; }
 .chip.on{ background:var(--pri); border-color:var(--pri); color:#fff; }
 .chk{ display:flex; align-items:center; gap:10px; padding:11px 13px; border:1.5px solid var(--line2); border-radius:var(--rk); margin-bottom:8px; font-size:14px; cursor:pointer; transition:.12s; }
 .chk.on{ border-color:var(--pri); background:var(--pri-soft); }
 .chk .bx{ width:20px; height:20px; border-radius:6px; border:2px solid #cbd5e1; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#fff; }
 .chk.on .bx{ background:var(--pri); border-color:var(--pri); }
 .chk .bx svg{ width:13px; height:13px; }
 .btn{ width:100%; padding:13px; border:none; border-radius:var(--rk); background:var(--pri); color:#fff; font-size:14.5px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; font-family:var(--fh); }
 .btn svg{ width:18px; height:18px; }
 .btn:active{ transform:scale(.99); } .btn:disabled{ opacity:.5; }
 .btn.sec{ background:#fff; color:var(--pri); border:1.5px solid var(--line2); }
 .btn.ghost{ background:#EEF2F7; color:#334155; }
 .btn.ok{ background:var(--health); }
 .btn.shopee{ background:linear-gradient(135deg,#FF6F3C,#EE4D2D); color:#fff; text-decoration:none; }
 a.btn{ text-decoration:none; }
 .stockb{ display:inline-block; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px; }
 .ldr{ width:54px; height:54px; border-radius:50%; border:5px solid var(--pri-soft); border-top-color:var(--pri); margin:0 auto; animation:spin 1s linear infinite; }
 @keyframes spin{ to{ transform:rotate(360deg); } }
 .kv{ display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; }
 .kv>div{ font-size:13px; line-height:1.5; }
 .rhead{ display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:700; color:var(--ink); font-family:var(--fh); margin:20px 2px 11px; }
 .rhead .rh-ic{ width:27px; height:27px; border-radius:9px; background:var(--pri-soft); color:var(--pri); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
 .rhead .rh-ic svg{ width:16px; height:16px; }
 .mgrid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px 10px; }
 .mgrid>div .k{ font-size:11.5px; color:var(--muted); } .mgrid>div .v{ font-size:14px; font-weight:700; color:var(--ink); margin-top:3px; }
 .btnrow{ display:flex; gap:10px; margin-top:13px; }
 .step{ display:flex; gap:5px; margin-bottom:14px; }
 .step div{ flex:1; height:4px; border-radius:2px; background:#DBE3EE; }
 .step div.on{ background:var(--pri); }
 .muted{ color:var(--muted); font-size:12px; } .faint{ color:var(--faint); font-size:11px; }
 .pill{ display:inline-block; padding:4px 11px; border-radius:999px; font-size:12px; font-weight:600; }
 .sec-title{ font-size:13px; font-weight:600; color:var(--pri-dark); margin:14px 0 7px; display:flex; align-items:center; gap:7px; font-family:var(--fh); }
 .sec-title .ico{ width:28px; height:28px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
 .sec-title .ico svg{ width:16px; height:16px; }
 .tabbar{ position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); display:flex; z-index:30; max-width:560px; margin:0 auto; padding:7px 2px 9px; }
 .tabbar button{ flex:1; border:none; background:none; padding:2px; font-size:9.5px; color:var(--faint); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; font-family:var(--fb); }
 .tabbar button svg{ width:21px; height:21px; }
 .tabbar button.on{ color:var(--pri); font-weight:600; }
 .hide{ display:none !important; }
 .gold{ background:var(--gold-soft); border:1px solid #F0C95A; border-radius:var(--rk); padding:11px; font-size:12.5px; margin-top:9px; color:#7a4310; }
 .alert{ border-radius:var(--rk); padding:14px; font-size:14px; line-height:1.6; }
 .alert.bad{ background:var(--warm-soft); border:1.5px solid #F3C0B8; color:#8f2a1e; }
 .facts{ font-size:13px; line-height:1.7; color:#374151; }
 .ntable{ width:100%; border-collapse:collapse; font-size:12.5px; margin-top:4px; }
 .ntable td{ padding:8px 4px; border-bottom:1px solid var(--line); }
 .ntable tr:last-child td{ border-bottom:none; }
 .ntable .v{ text-align:right; font-weight:600; color:var(--ink); }
 .ntable .u{ text-align:right; color:var(--faint); width:54px; }
 .ntable tr.lf td{ background:var(--gold-soft); }
 .prodimg{ height:92px; border-radius:14px; display:flex; align-items:flex-end; padding:10px; color:#fff; font-weight:700; font-size:13px; text-shadow:0 1px 4px rgba(0,0,0,.25); }
 .qclose{ background:#F7FAFF; border-top:1px solid var(--line); display:flex; align-items:center; padding:11px 14px; gap:8px; }
 .qclose .c{ flex:1; text-align:center; } .qclose .c .l{ font-size:9.5px; color:var(--faint); } .qclose .c .n{ font-size:13px; font-weight:700; color:var(--ink); }
 .qclose .sep{ width:1px; height:24px; background:var(--line2); }
 .gauge text{ font-family:var(--fh); }
 .qa-item{ border:1px solid var(--line); border-radius:var(--rk); margin-bottom:8px; overflow:hidden; background:#fff; }
 .qa-q{ padding:13px; font-weight:600; font-size:14px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; align-items:center; }
 .qa-q svg{ width:18px; height:18px; color:var(--faint); flex-shrink:0; }
 .qa-a{ padding:0 13px 13px; font-size:13px; line-height:1.7; color:#374151; white-space:pre-line; }
 .qa-item{ transition:box-shadow .22s ease, border-color .22s ease, transform .22s ease; }
 .qa-item.on{ border:1.5px solid var(--pri); box-shadow:0 10px 26px rgba(29,78,216,.18); transform:translateY(-1px); }
 .qa-item.on .qa-q{ background:linear-gradient(135deg,#EAF1FF,#DCE9FF); color:#10357A; }
 .qa-item.on .qa-q svg{ color:var(--pri); transform:rotate(90deg); transition:transform .2s; }
 .qa-item.on .qa-a{ border-top:1px dashed #cfe0fb; padding-top:11px; margin-top:0; }
 mark{ background:#FDE9A7; padding:0 2px; border-radius:3px; }
 .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
 .foot-note{ font-size:11px; color:var(--faint); line-height:1.5; margin-top:10px; border-top:1px dashed var(--line2); padding-top:9px; }
 .searchbox{ display:flex; align-items:center; gap:9px; border:1px solid var(--line2); border-radius:var(--rk); padding:0 12px; background:#fff; }
 .searchbox svg{ width:18px; height:18px; color:var(--faint); flex-shrink:0; } .searchbox input{ border:none; padding:12px 0; } .searchbox input:focus{ box-shadow:none; }

 .prdimg{ display:block; width:80vw; max-width:430px; height:auto; margin:0 auto; object-fit:contain; }
 .fb-grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
 .fb-card{ border-radius:16px; overflow:hidden; box-shadow:0 5px 16px rgba(20,40,80,.10); cursor:pointer; background:#fff; transition:transform .15s; }
 .fb-card:active{ transform:scale(.96); }
 .fb-card img{ width:100%; display:block; aspect-ratio:1/1; object-fit:cover; }
 .fb-lb{ width:100%; max-height:86vh; object-fit:contain; border-radius:14px; display:block; }

 .pgrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
 .pcard{ background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 4px 14px rgba(20,40,80,.07); cursor:pointer; }
 .pcard-img{ height:118px; }
 .pcard-b{ padding:10px 12px; } .pcard-t{ font-weight:700; font-family:var(--fh); font-size:13px; color:var(--ink); }
 .docwrap{ margin:8px 0; } .docimg{ display:block; width:80vw; max-width:430px; height:auto; margin:0 auto; object-fit:contain; border-radius:12px; box-shadow:0 2px 8px rgba(20,40,80,.08); }

#loader{ position:fixed; inset:0; z-index:95; display:none; align-items:center; justify-content:center; background:rgba(240,248,255,.66); backdrop-filter:blur(3px); }
#loader.show{ display:flex; animation:ldfade .18s ease; }
#loader .ldbox{ display:flex; flex-direction:column; align-items:center; }
#loader .ld-spin{ position:relative; width:104px; height:104px; display:flex; align-items:center; justify-content:center; }
#loader .ld-ring{ position:absolute; inset:0; border-radius:50%; border:3px solid transparent; border-top-color:#1D4ED8; border-right-color:#3FB6E8; animation:spin .8s linear infinite; }
#loader .ld-mas{ width:82px; height:82px; border-radius:50%; overflow:hidden; position:relative; background:#fff; box-shadow:0 8px 22px rgba(20,60,140,.22); border:3px solid #FFD36E; animation:ldbob 1s ease-in-out infinite; }
#loader .ld-txt{ margin-top:13px; font-family:var(--fh); font-weight:600; color:#1D4ED8; font-size:13px; letter-spacing:.3px; }
@keyframes ldbob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes ldfade{ from{opacity:0} to{opacity:1} }

#fab .fab-hi{ position:absolute; right:66px; top:50%; transform:translateY(-50%) scale(.5); transform-origin:right center; white-space:nowrap; background:#fff; color:#10357A; font-weight:700; font-family:var(--fh); font-size:12.5px; padding:7px 13px; border-radius:14px; box-shadow:0 6px 16px rgba(20,60,140,.22); opacity:0; pointer-events:none; transition:opacity .25s ease, transform .3s cubic-bezier(.2,.8,.3,1.5); z-index:36; }
#fab .fab-hi::after{ content:""; position:absolute; right:-5px; top:50%; transform:translateY(-50%); border:6px solid transparent; border-left-color:#fff; }
#fab .fab-hi.show{ opacity:1; transform:translateY(-50%) scale(1); }

.pshine-box{ position:relative; }
.pshine-box::after{ content:""; position:absolute; top:0; left:-60%; width:45%; height:100%; background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent); transform:skewX(-18deg); animation:pshine 3.2s ease-in-out infinite; pointer-events:none; }
@keyframes pshine{ 0%{left:-60%} 60%{left:130%} 100%{left:130%} }

/* ---- Toast thông báo ---- */
#toastwrap{position:fixed;left:0;right:0;bottom:calc(70px + env(safe-area-inset-bottom,0px));display:flex;flex-direction:column;align-items:center;gap:8px;z-index:9999;pointer-events:none;padding:0 14px}
.toast{pointer-events:auto;max-width:440px;width:100%;display:flex;align-items:flex-start;gap:10px;background:#122033;color:#fff;border-radius:14px;padding:12px 14px;font-size:13.5px;line-height:1.45;box-shadow:0 10px 30px rgba(10,20,40,.28);transform:translateY(18px);opacity:0;transition:transform .32s cubic-bezier(.22,1,.36,1),opacity .28s}
.toast.show{transform:translateY(0);opacity:1}
.toast .ti{flex-shrink:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.toast.ok{background:#0E3D2E}.toast.ok .ti{background:#12B981;color:#fff}
.toast.err{background:#3F1620}.toast.err .ti{background:#F0466B;color:#fff}
.toast.info{background:#122033}.toast.info .ti{background:#3B82F6;color:#fff}
.toast .tt{flex:1;min-width:0;white-space:pre-line}
</style>

   {q:"Thương hiệu sữa Wintop đã vinh dự được nhận giải thưởng quốc tế nào vào năm 2024?", o:["Top 5 Thương hiệu hàng đầu Châu Á.", "Cúp vàng y tế chuyên khoa nhi thế giới.", "Hàng Việt Nam chất lượng cao chuẩn quốc tế."], c:0, e:"Wintop được xướng tên \"Asia Top Brand Awards 2024\" tại Diễn đàn hội nhập kinh tế quốc tế. Đây là minh chứng rõ ràng cho chất lượng sản phẩm chuẩn quốc tế của nhãn hàng."} ]},
 { lv:"Nâng cao", qs:[
   {q:"Vitamin K2 (MK-7) đóng vai trò quan trọng nhất là gì trong phát triển chiều cao?", o:["Tự tổng hợp và sinh ra Canxi mới.", "Điều hướng Canxi từ máu gắn chặt vào xương.", "Giảm sự bài tiết Canxi qua đường mồ hôi."], c:1, e:"D3 đưa Canxi vào máu. Nếu không có K2, Canxi sẽ trôi nổi gây vôi hóa mạch máu. K2 kích hoạt Osteocalcin đóng vai trò \"chiếc xe\" chở Canxi đắp thẳng vào mô xương."},
   {q:"Biểu hiện của \"Hội chứng bất dung nạp Lactose\" ở trẻ sau khi dùng sữa là gì?", o:["Ngủ li bì, nhịp tim giảm đột ngột.", "Sôi bụng, tiêu chảy phân chua, hăm hậu môn.", "Nổi mề đay, nghẹt mũi khó thở ngay lập tức."], c:1, e:"Trẻ không đủ men Lactase để tiêu hóa đường Lactose. Đường này trôi xuống ruột già bị lên men tạo khí (chướng bụng) và axit lactic (tiêu chảy, hăm rát hậu môn)."},
   {q:"Để tối ưu hóa quá trình hấp thu Sắt, mẹ nên cho bé uống kèm với gì?", o:["Nước cam, chanh (giàu Vitamin C).", "Sữa đặc có đường.", "Canxi liều lượng cao."], c:0, e:"Niêm mạc ruột non chỉ hấp thu sắt hóa trị 2. Vitamin C tạo môi trường axit lý tưởng trong dạ dày, khử sắt hóa trị 3 về hóa trị 2, đẩy nhanh tốc độ hấp thu triệt để."},
   {q:"Trẻ suy dinh dưỡng thấp còi kéo dài có nguy cơ gì cao nhất khi trưởng thành?", o:["Sở hữu chiều cao vượt trội do phát triển bù.", "Dễ mắc các bệnh truyền nhiễm ngoài da.", "Nguy cơ béo phì, tiểu đường và mỡ máu."], c:2, e:"Cơ thể trẻ suy dinh dưỡng thiết lập cơ chế sinh tồn \"tiết kiệm năng lượng\". Khi lớn lên, mức chuyển hóa thấp khiến calo dễ tích tụ thành mỡ, gây rối loạn chuyển hóa."},
   {q:"Dưỡng chất HMO bảo vệ hệ miễn dịch đường ruột bằng cơ chế hóa học nào?", o:["Tạo màng nhầy bít kín hoàn toàn thành ruột.", "Đóng vai trò \"mồi nhử\" lừa mầm bệnh bám vào.", "Sinh ra nhiệt lượng để tiêu diệt vi khuẩn."], c:1, e:"Cấu trúc HMO giống hệt thụ thể niêm mạc ruột. Vi khuẩn bị đánh lừa sẽ bám vào các HMO trôi nổi thay vì bám vào ruột, sau đó bị cuốn trôi ra ngoài qua đường phân."},
   {q:"Tỷ lệ Canxi/Photpho (Ca/P) trong sữa công thức được thiết kế ở mức nào là lý tưởng?", o:["Tương tự sữa mẹ sinh lý (1.2 đến 2.0).", "Luôn luôn phải nhỏ hơn mức 1.0.", "Tỷ lệ thật lớn, duy trì trên mức 3.0."], c:0, e:"Hấp thu Canxi phụ thuộc vào nồng độ Photpho. Tỷ lệ Ca/P từ 1.2 đến 2.0 giúp quá trình lắng đọng vi khoáng vào màng xương diễn ra hoàn hảo nhất mà không bị cạnh tranh đào thải."},
   {q:"Trẻ biếng ăn kéo dài, đi phân sống, hay ốm vặt nên ưu tiên bổ sung nhóm chất nào?", o:["Canxi và Vitamin D3 liều lượng cao.", "Vi khoáng Sắt kết hợp với Vitamin C.", "Men vi sinh, Kẽm và Axit amin Lysine."], c:2, e:"Kẽm và Lysine phục hồi tế bào vị giác, kích thích enzyme tiêu hóa. Men vi sinh cung cấp lợi khuẩn dọn dẹp hại khuẩn, tái lập hàng rào niêm mạc ruột chặn đứng việc đi phân sống."},
   {q:"Sự khác biệt lớn nhất giữa bổ sung DHA từ vi tảo biển so với DHA từ dầu cá là gì?", o:["Vi tảo tinh khiết, không tanh, không nhiễm độc.", "Dầu cá có màu sắc đẹp mắt và bắt sáng hơn.", "Vi tảo biển có giá thành rẻ, dễ sản xuất hơn."], c:0, e:"Vi tảo là nguồn gốc đầu chuỗi thức ăn (cá ăn tảo mới có DHA). Chiết xuất từ tảo được nuôi cấy khép kín sẽ loại bỏ 100% mùi tanh và nguy cơ nhiễm kim loại nặng từ đại dương."},
   {q:"Thói quen pha sữa ở nhiệt độ quá cao (trên 70 độ C) sẽ gây ra hậu quả gì?", o:["Làm đạm Whey biến tính thành chất độc hại.", "Tiêu diệt lợi khuẩn sống và phá hủy vitamin nhạy nhiệt.", "Làm cấu trúc đường Lactose bị cháy khét."], c:1, e:"Lợi khuẩn (Probiotics) rất mong manh, chỉ sống sót an toàn ở 40 - 45 độ C. Nước sôi trên 70 độ sẽ luộc chín lợi khuẩn và làm bốc hơi lượng lớn Vitamin nhóm B, C."},
   {q:"Khi bé vào \"Wonder Weeks\" chán ăn đột ngột, mẹ nên áp dụng chiến thuật dinh dưỡng nào?", o:["Bắt ép bé ăn bằng mọi giá để không sụt cân.", "Không ép ăn, chia nhỏ cữ sữa Wintop để bù năng lượng.", "Đổi ngay sang một loại sữa đặc trị đậm đặc hơn."], c:1, e:"Ép ăn sẽ tạo vòng lặp biếng ăn tâm lý dai dẳng. Sữa Wintop với đầy đủ dinh dưỡng sẽ giúp bù đắp năng lượng thiếu hụt trong những ngày bé từ chối thức ăn đặc."} ]},
 { lv:"Chuyên sâu", qs:[
   {q:"Chỉ số BMI của trẻ em được đánh giá dựa trên tiêu chuẩn khác biệt nào so với người lớn?", o:["Đo tỷ lệ vòng đầu so với vòng ngực.", "Bắt buộc đối chiếu trên biểu đồ bách phân vị (Percentile).", "Chỉ cần chia cân nặng cho bình phương chiều cao."], c:1, e:"Do trẻ liên tục phát triển, con số BMI phải được đặt lên biểu đồ Percentile theo tháng tuổi/giới tính. Nếu điểm nằm trên dải 85% là Thừa cân, vượt 95% là Béo phì."},
   {q:"\"Quy tắc 1/4\" khi chuyển đổi sang dòng sữa mới cho trẻ được thực hiện như thế nào?", o:["Ép trẻ uống hết 1/4 ly sữa mới ngay lần đầu.", "Trộn dần 1/4 lượng sữa mới vào sữa cũ, rồi tăng tịnh tiến.", "Mỗi tuần chỉ cho trẻ uống sữa mới 4 lần."], c:1, e:"Mỗi loại sữa có hệ đạm và prebiotic riêng. Trộn dần sữa giúp hệ vi khuẩn đường ruột có thời gian điều tiết enzyme tiêu hóa phù hợp, ngăn ngừa hiện tượng tiêu chảy sinh lý do sốc thành phần."},
   {q:"Dưới góc độ tế bào học, \"Thiếu máu do thiếu Sắt\" và \"Thiếu máu do thiếu Folic\" khác nhau ra sao?", o:["Thiếu Sắt hồng cầu teo nhỏ; Thiếu Folic hồng cầu phình to.", "Thiếu Sắt giảm lượng bạch cầu; Thiếu Folic giảm tiểu cầu.", "Hình thái của tế bào máu hoàn toàn không bị biến đổi."], c:0, e:"Sắt tạo huyết sắc tố, thiếu sắt hồng cầu sẽ teo nhỏ, nhợt nhạt. Axit Folic phục vụ tổng hợp DNA tách tế bào, thiếu Folic hồng cầu không tách được sẽ phình to mỏng manh dễ vỡ."},
   {q:"\"Cửa sổ vàng 1000 ngày đầu đời\" quyết định bao nhiêu % tiềm năng chiều cao lúc trưởng thành?", o:["Chỉ quyết định khoảng 10%.", "Quyết định khoảng 40% - 50%.", "Quyết định 100% tiềm năng chiều cao."], c:1, e:"Tốc độ tăng trưởng 2 năm đầu là nhanh nhất. Lúc 2 tuổi, chiều cao của trẻ nhân đôi sẽ xấp xỉ bằng chiều cao lúc trưởng thành. Bỏ lỡ dinh dưỡng giai đoạn này là tổn thất vĩnh viễn."},
   {q:"Chế biến thức ăn quá kỹ, hầm quá nhừ nát gây bất lợi gì cho trẻ có nguy cơ béo phì?", o:["Phá vỡ chất xơ, tăng chỉ số đường huyết (GI) gây tích mỡ.", "Làm thức ăn có vị đắng khiến trẻ chán ăn.", "Làm tiêu hao hết lượng nước tự nhiên trong thực phẩm."], c:0, e:"Khi màng bảo vệ chất xơ bị phá vỡ, đường giải phóng ồ ạt vào máu. Tuyến tụy phải tiết lượng lớn Insulin để dập tắt đường huyết, và Insulin sẽ chuyển hóa ngay đường dư thừa thành mô mỡ."},
   {q:"Lượng Canxi nguyên tố (theo RDA) cần thiết mỗi ngày cho trẻ từ 1-3 tuổi là bao nhiêu?", o:["200 mg.", "500 mg.", "1500 mg."], c:1, e:"Trẻ 1-3 tuổi cần 500mg Canxi. Mẹ chỉ cần duy trì 400-500ml sữa công thức Wintop mỗi ngày, kết hợp ăn dặm thông thường là đã cung cấp dư dả lượng Canxi chuẩn khoa học."},
   {q:"Tỷ lệ mỡ cơ thể (Body Fat) ở bé trai trước dậy thì vượt mức nào cảnh báo nguy cơ rối loạn nội tiết?", o:["Vượt quá mức 10%.", "Vượt quá mức 25%.", "Vượt quá mức 45%."], c:1, e:"Tỷ lệ mỡ sinh lý nam giới là 15-20%. Khi Body Fat vượt 25%, mô mỡ hoạt động như tuyến nội tiết sản sinh Estrogen, ức chế hormone nam và là nguyên nhân hàng đầu gây dậy thì sớm."},
   {q:"Vì sao nhiều trẻ béo phì nhưng xét nghiệm sinh hóa máu vẫn báo \"Suy dinh dưỡng thiếu vi chất\"?", o:["Trẻ uống quá nhiều nước khoáng đóng chai.", "Nạp thừa calo rỗng từ đồ ngọt/tinh bột, nhưng rỗng vi khoáng.", "Trẻ vận động thể thao quá mức làm tiêu hao hết vitamin."], c:1, e:"Đồ ăn nhanh, snack chứa nguồn năng lượng cực lớn nhưng bị ép chín ở nhiệt độ cao làm phân hủy hết vi khoáng (Sắt, Kẽm, Canxi). Trẻ béo mỡ bên ngoài nhưng nội tạng lại đói vi chất (nạn đói tiềm ẩn)."},
   {q:"Việc Wintop bổ sung \"bộ đôi Vitamin D3 và K2 (MK-7)\" mang lại ý nghĩa y khoa cốt lõi gì?", o:["Giúp bảo quản sữa không bị hỏng, giữ được hương vị.", "D3 hấp thu Canxi vào máu, K2 định hướng Canxi đắp vào xương.", "Giúp phân giải chất béo trong sữa nhanh hơn."], c:1, e:"D3 mở cửa ruột đưa Canxi vào máu. K2 (MK-7) là chiếc \"công tắc\" kích hoạt Protein tạo xương, gom Canxi trôi nổi trong máu kéo thẳng đến đĩa sụn, giúp xương đặc và dài ra tối đa."},
   {q:"Tại sao thói quen cho trẻ ngậm bình sữa khi ngủ (bú đêm) lại gây Hội chứng sâu răng cực nhanh?", o:["Do núm vú cao su cọ xát làm xước men răng của bé.", "Canxi trong sữa đọng lại tạo thành vôi răng dày đặc.", "Vi khuẩn lên men lượng đường Lactose đọng lại thành axit."], c:2, e:"Khi ngủ, nước bọt tiết ra rất ít. Vi khuẩn trong miệng sẽ ăn lớp sữa Lactose đọng lại trên răng, sinh ra axit lactic ăn mòn nhanh chóng khoáng chất bề mặt gây ra các lỗ sâu đen xì."} ]},
 { lv:"Chuyên gia", qs:[
   {q:"Năng lượng tiêu hao cơ bản (BMR) ở trẻ em chiếm tỷ lệ lớn nhất là dành cho hoạt động nào?", o:["Vận động cơ bắp, chạy nhảy và thể thao ngoài trời.", "Duy trì hô hấp, tuần hoàn tim mạch và phân chia tế bào.", "Sự co bóp liên tục của dạ dày để tiêu hóa đồ ăn."], c:1, e:"BMR chiếm 60-70% tổng calo nạp vào. Kể cả khi nằm ngủ, não bộ, tim, phổi và hàng triệu tế bào nội tạng vẫn đang phải phân đôi nhân lên để cơ thể lớn lên, quá trình này tiêu hao năng lượng khổng lồ."},
   {q:"Nhóm Axit amin nào trong sữa kích thích tuyến yên giải phóng Hormone tăng trưởng (GH) lúc ngủ?", o:["Glutamine và Glycine.", "Arginine và Lysine.", "Taurine và Choline."], c:1, e:"Cơ thể không tự tổng hợp được Arginine và Lysine. Các chứng minh lâm sàng cho thấy nồng độ cao của hai chất này trong máu giúp tối ưu hóa việc giải phóng Hormone GH, tạo điều kiện cốt hóa kéo dài xương ban đêm."},
   {q:"Bổ sung đồng thời liều cao các khoáng chất Canxi, Sắt, Kẽm cùng lúc sẽ gây ra hiện tượng gì?", o:["Sinh ra nhiệt lượng gây nóng trong, lở loét miệng.", "Xảy ra sự ức chế cạnh tranh tại ruột, loại trừ lẫn nhau.", "Làm biến đổi màu sắc phân thành màu đen sẫm."], c:1, e:"Các khoáng chất hóa trị 2 dùng chung một \"cổng vận chuyển\" vào màng ruột. Nếu nạp cùng lúc, Canxi (do nồng độ cao) sẽ chiếm hết cổng, chặn đứng hoàn toàn khả năng hấp thu của Sắt và Kẽm."},
   {q:"Yếu tố IGF-1 được gan tổng hợp nhờ đạm sữa có nhiệm vụ cơ học gì tại khớp xương?", o:["Kích thích tế bào sụn (Chondrocytes) phân chia, kéo dài xương.", "Làm xơ cứng mô sụn để chấm dứt quá trình tăng trưởng.", "Chuyển hóa lớp sụn thành lớp tế bào mỡ bôi trơn."], c:0, e:"Hormone GH không trực tiếp làm dài xương mà ra lệnh cho Gan tiết ra IGF-1. IGF-1 mới đi theo máu đến hai đầu xương dài, kích thích tế bào đĩa sụn nhân lên nhiều lớp đắp lên nhau đùn trục xương dài ra."},
   {q:"Nhồi nhét ép trẻ sinh non (SGA) tăng cân bù quá đà bằng calo rỗng gây hậu quả tàn khốc gì?", o:["Làm mật độ xương giảm sút, gây loãng xương sớm.", "Gây rối loạn Insulin, bùng phát bệnh tiểu đường, mỡ máu khi lớn.", "Làm thoái hóa võng mạc, gây suy giảm thị lực nặng."], c:1, e:"Theo Thuyết Barker, cơ thể trẻ sinh non đã \"lập trình\" quen với mức dinh dưỡng nghèo nàn. Ép béo quá nhanh làm tuyến tụy quá tải, kháng insulin vĩnh viễn, mỡ len lỏi vào nội tạng gây bệnh lý tim mạch."},
   {q:"Kháng thể IgG từ Sữa non làm sao sống sót qua \"biển axit\" của dạ dày trẻ?", o:["Nhờ kháng thể tự bọc một lớp vỏ kim loại vững chắc.", "Dạ dày trẻ có pH cao và sữa non có chất ức chế men tiêu hóa.", "Kháng thể đi thẳng vào máu qua hệ mao mạch dưới lưỡi."], c:1, e:"Dạ dày người lớn có nồng độ axit mạnh (pH ~1.5). Nhưng dạ dày nhũ nhi tiết rất ít axit (pH cao). Kèm theo chất ức chế enzyme Trypsin có trong sữa non tạo thành \"áo giáp\" giúp IgG đi xuống ruột non an toàn."},
   {q:"Sự khác biệt ưu việt của dòng sữa đậm độ năng lượng cao Wintop BA (1.2 kcal/ml) giúp trẻ từ 1-10 tuổi có thể sử dụng duy trì lâu dài mỗi ngày mà không lo tác dụng phụ là gì?", o:["Wintop BA loại bỏ hoàn toàn chất béo và đường nên không gây tăng cân đột ngột.", "Hệ dưỡng chất chuẩn sinh lý kết hợp đạm hòa tan dễ tiêu, cung cấp năng lượng cao nhưng không gây quá tải gan thận.", "Sữa có vị nhạt như nước lọc giúp bé uống thay nước hàng ngày."], c:1, e:"Các dòng cao năng lượng cũ thường khó tiêu nên bị hạn chế thời gian dùng. Wintop BA (1.2 kcal/ml) được tối ưu bằng hệ đạm hòa tan êm ái cùng tỷ lệ vi chất cân bằng. Bé hấp thu trọn vẹn mức năng lượng cao để tăng cân mà hệ tiêu hóa vẫn nhẹ nhàng. Mẹ hoàn toàn yên tâm cho bé dùng Wintop BA mỗi ngày trong suốt giai đoạn 1-10 tuổi để duy trì đà phát triển bền vững."},

function interp(t,x){ var ks=Object.keys(t).map(Number).sort(function(a,b){return a-b;}); if(x<=ks[0])return t[ks[0]]; if(x>=ks[ks.length-1])return t[ks[ks.length-1]]; for(var i=0;i<ks.length-1;i++){ if(x>=ks[i]&&x<=ks[i+1]){var r=(x-ks[i])/(ks[i+1]-ks[i]);return t[ks[i]]+r*(t[ks[i+1]]-t[ks[i]]);} } return t[ks[0]]; }
var WB={0:3.3,3:6.4,6:7.9,9:8.9,12:9.6,24:12.2,36:14.3,48:16.3,60:18.3}, WG={0:3.2,3:5.8,6:7.3,9:8.2,12:8.9,24:11.5,36:13.9,48:16.1,60:18.2};
function zwa(m,w,g){ var M=interp(g==="Nam"?WB:WG,m); return (w-M)/(M*0.12); }
function num(k){ var x=parseFloat(S.m[k]); return isFinite(x)?x:null; }
function classify(){ var o=S.user.obj,w=num("w"),h=num("h");
 if(o==="tre_0_12"){var mo=num("months");if(mo==null||w==null)return null;var z=zwa(mo,w,S.user.gender);var M=interp(S.user.gender==="Nam"?WB:WG,mo);return {status:z<-2?"low":z>2?"high":"normal",label:z<-3?"Suy dinh dưỡng nặng":z<-2?"Nhẹ cân":z>2?"Thừa cân":"Bình thường",metric:"Z-score cân/tuổi ≈ "+z.toFixed(1),approx:true,val:w,lo:M*0.88,hi:M*1.12,unit:" kg",std:M.toFixed(1)+" kg"};}
 if(o==="tre_1_10"){var age=num("age");if(age==null||w==null||h==null)return null; if(age<5){var z2=zwa(age*12,w,S.user.gender);var M2=interp(S.user.gender==="Nam"?WB:WG,age*12);return {status:z2<-2?"low":z2>2?"high":"normal",label:z2<-3?"Suy dinh dưỡng nặng":z2<-2?"Nhẹ cân":z2>2?"Thừa cân":"Bình thường",metric:"Z-score cân/tuổi ≈ "+z2.toFixed(1),approx:true,val:w,lo:M2*0.88,hi:M2*1.12,unit:" kg",std:M2.toFixed(1)+" kg"};} var b=w/Math.pow(h/100,2),lo=age<8?15.0:15.5,hi=age<8?20.0:21.0;return {status:b<lo?"low":b>=hi?"high":"normal",label:b<lo?"Gầy":b>=hi?"Thừa cân":"Bình thường",metric:"BMI = "+b.toFixed(1),val:b,lo:lo,hi:hi,unit:"",std:((lo+hi)/2).toFixed(1)};}
 if(o==="adult"){if(w==null||h==null)return null;var b=w/Math.pow(h/100,2),st,lb;if(b<17){st="low";lb="Gầy độ 2";}else if(b<18.5){st="low";lb="Gầy độ 1";}else if(b<23){st="normal";lb="Bình thường";}else if(b<25){st="high";lb="Thừa cân";}else if(b<30){st="high";lb="Béo phì độ 1";}else{st="high";lb="Béo phì độ 2";}return {status:st,label:lb,metric:"BMI = "+b.toFixed(1),val:b,lo:18.5,hi:22.9,unit:"",std:"18.5–22.9"};}
 var pw=num("pw");if(pw==null||h==null)return null;var pb=pw/Math.pow(h/100,2),g={lo:11.5,hi:16,cat:"Bình thường",t1lo:1,t1hi:2,rlo:0.35,rhi:0.50};if(pb<18.5)g={lo:12.5,hi:18,cat:"Gầy",t1lo:1,t1hi:2,rlo:0.44,rhi:0.58};else if(pb>=30)g={lo:5,hi:9,cat:"Béo phì",t1lo:0.5,t1hi:1,rlo:0.17,rhi:0.27};else if(pb>=25)g={lo:7,hi:11.5,cat:"Thừa cân",t1lo:0.5,t1hi:1,rlo:0.23,rhi:0.33};else if(pb>=23)g={lo:7,hi:11.5,cat:"Thừa cân",t1lo:0.5,t1hi:1,rlo:0.23,rhi:0.33};var ac=w!=null?(w-pw):null;var wk=num("week"),traj=null;if(wk!=null&&wk>0){var tri=wk<=13?1:wk<=27?2:3,elo,ehi;if(wk<=13){elo=g.t1lo*(wk/13);ehi=g.t1hi*(wk/13);}else{var ww=Math.min(wk,40)-13;elo=g.t1lo+ww*g.rlo;ehi=g.t1hi+ww*g.rhi;}var gs=(ac==null)?"":(ac<elo-0.5?"thiếu":ac>ehi+0.5?"vượt":"đạt");traj={tri:tri,elo:elo,ehi:ehi,gs:gs,ac:ac,wk:wk};}return {status:"pregnant",label:"BMI trước thai "+pb.toFixed(1)+" ("+g.cat+")",metric:"Tăng cân khuyến nghị "+g.lo+"–"+g.hi+" kg"+(ac!=null?(" · thực tế +"+ac.toFixed(1)+" kg"):""),val:pb,lo:18.5,hi:22.9,unit:"",std:"18.5–22.9",cat:g.cat,totLo:g.lo,totHi:g.hi,traj:traj}; }

ân đối lành mạnh giúp hỗ trợ việc kiểm soát và ổn định đường huyết. Sản phẩm bổ sung các dưỡng chất có lợi cho sức khỏe, giúp bồi bổ và tăng cường thể lực.", "b": [["Hỗ Trợ Ổn Định Đường Huyết", "Wintop Diabet sử dụng hệ bột đường có chỉ số đường huyết thấp (Isomalt, Fructose), hấp thu từ từ, không làm tăng nhanh đường huyết sau ăn và tránh hạ đường huyết lúc đói nhờ đó giúp hỗ trợ việc kiểm soát đường huyết bằng chế độ ăn nhằm ổn định đường huyết."], ["Phục Hồi Sức Khỏe", "Công thức dinh dưỡng cân đối, phù hợp, cung cấp Năng lượng, Protein giúp bồi bổ cơ thể và hồi phục thể lực. Hệ Vitamin và Khoáng chất đa dạng giúp hỗ trợ tăng cường sức đề kháng và duy trì sức khỏe."], ["Hệ Xương Khỏe Mạnh", "Canxi, Photpho, Magie đảm bảo nhu cầu khoáng chất cần thiết cho cơ thể, hỗ trợ phòng ngừa loãng xương. Vitamin D3 hỗ trợ hấp thu Canxi giúp xương chắc khỏe."], ["Hỗ Trợ Tiêu Hóa, Hấp Thu", "Chất xơ hòa tan (FOS/Inulin) giúp nuôi dưỡng hệ lợi khuẩn và kích thích miễn dịch đường ruột, cho hệ tiêu hóa khỏe mạnh và hỗ trợ phòng ngừa táo bón. Lysine, Vitamin nhóm B làm tăng chuyển hóa dinh dưỡng, giúp ăn ngon miệng và hấp thu tốt các dưỡng chất từ bữa ăn."]]}, "gainpro": {"intro": "Wintop Gain Pro là sản phẩm dinh dưỡng dùng để bổ sung cho chế độ ăn hàng ngày, cung cấp năng lượng và các vi chất dinh dưỡng giúp bồi bổ cơ thể, hỗ trợ phục hồi thể trạng và tăng cường sức khỏe.", "b": []}, "kaoiq": {"intro": "Wintop Kao IQ là sản phẩm dinh dưỡng công thức dành cho trẻ từ 1-10 tuổi. Sản phẩm có công thức đầy đủ và cân đối, bổ sung các dưỡng chất thiết yếu giúp trẻ tăng trưởng tốt và phát triển khoẻ mạnh.", "b": []}, "mama": {"intro": "Wintop Mama là sản phẩm dùng để thay thế bữa ăn phụ, bổ sung vi chất dinh dưỡng, giúp tăng cường sức khỏe cho các bà mẹ, tăng chất lượng sữa mẹ giai đoạn sau sinh.", "b": []}, "suregold": {"intro": "Wintop Sure Gold là sản phẩm dinh dưỡng dùng để bổ sung cho chế độ ăn hàng ngày, cung cấp năng lượng và các vi chất dinh dưỡng giúp bồi bổ cơ thể và tăng cường sức khỏe.", "b": []}};

function pInfoSec(id){ var d=PINFO[id]; if(!d) return ""; var s=secT("info","var(--health-soft)","var(--health)","Công dụng & thông tin sản phẩm"); if(d.intro) s+='<div class="facts" style="background:var(--health-soft);border-radius:12px;padding:11px;line-height:1.55">'+esc(d.intro)+'</div>'; if(d.b&&d.b.length){ s+='<div style="margin-top:8px">'+d.b.map(function(x){return '<div style="display:flex;gap:9px;padding:9px 11px;background:#fff;border:1px solid #e6eef7;border-radius:12px;margin-bottom:7px"><span style="flex-shrink:0;width:8px;height:8px;border-radius:50%;background:var(--health);margin-top:6px"></span><div><div style="font-weight:700;font-size:13px;color:var(--health)">'+esc(x[0])+'</div><div class="faint" style="line-height:1.5;margin-top:2px">'+esc(x[1])+'</div></div></div>';}).join("")+'</div>'; } return s; }

   pInfoSec(p.id)+secT("calc","var(--pri-soft)","var(--pri)","Bảng thành phần dinh dưỡng")+'<div style="border:2px solid #DCEBFB;border-radius:16px;padding:9px;background:linear-gradient(160deg,#F3F8FF,#ffffff);box-shadow:0 6px 18px rgba(29,78,216,.10);margin-bottom:9px"><img loading="lazy" src="assets/products/'+p.id+'/tpdd.jpg" alt="Bảng thành phần '+esc(p.name)+'" style="width:100%;display:block;border-radius:11px" onerror="this.parentNode.style.display=\'none\';var t=document.getElementById(\'tt-'+p.id+'\');if(t)t.style.display=\'\'"></div><table class="ntable" id="tt-'+p.id+'" style="display:none">'+factRows(p.facts)+(hasLf?'<tr class="lf"><td>⭐ Lactoferrin</td><td class="v">Có</td></tr>':"")+'</table>'+
   secT("leaf","var(--health-soft)","var(--health)","Thành phần nguyên liệu")+'<div class="facts">'+esc(p.ingr)+'</div>'+

function renderQA(){ var t=deburr(S.qaTerm),list=QA.filter(function(x){return !t||deburr(x.q+" "+x.tags+" "+x.a).indexOf(t)>=0;}); function hl(s){if(!t)return esc(s);var d=deburr(s),i=d.indexOf(t);if(i<0)return esc(s);return esc(s.slice(0,i))+"<mark>"+esc(s.slice(i,i+t.length))+"</mark>"+esc(s.slice(i+t.length));}
 return '<h2>Tra cứu Hỏi-Đáp</h2><div class="card"><div class="searchbox">'+ic("search",18)+'<input id="qa" value="'+esc(S.qaTerm)+'" oninput="S.qaTerm=this.value;qaOnly()" placeholder="táo bón, tiêu chảy, tăng cân, tiểu đường..."/></div><div class="muted" style="margin-top:8px">'+list.length+' câu hỏi · gõ từ khoá để lọc nhanh</div></div><div id="qalist">'+(list.map(function(x){var idx=QA.indexOf(x),op=S.qaOpen===idx;return '<div class="qa-item'+(op?" on":"")+'"><div class="qa-q" onclick="S.qaOpen='+(op?-1:idx)+';qaOnly()">'+hl(x.q)+ic(op?"chev":"chev",18)+'</div>'+(op?'<div class="qa-a">'+hl(x.a)+'</div>':"")+'</div>';}).join("")||'<div class="card muted">Không tìm thấy câu hỏi phù hợp.</div>')+'</div>'; }
function qaOnly(){ var v=el("view"),cur=document.activeElement,pos=cur&&cur.id==="qa"?cur.selectionStart:null; v.innerHTML=renderQA(); if(pos!=null){var n=el("qa");if(n){n.focus();try{n.setSelectionRange(pos,pos);}catch(e){}}} }

var BADGES=[{i:"leaf",t:"Tập sự"},{i:"school",t:"Nhân viên"},{i:"check",t:"Tư vấn viên"},{i:"star",t:"Chuyên gia DD"},{i:"trophy",t:"Đại sứ WINTOP"}];
function renderQuiz(){ if(!S.quiz)return '<h2>Quiz ôn tập nghiệp vụ</h2>'+QUIZ.map(function(L,i){return '<div class="card" style="display:flex;align-items:center;gap:12px"><div style="width:42px;height:42px;border-radius:13px;background:var(--pri-soft);color:var(--pri);display:flex;align-items:center;justify-content:center">'+ic(["leaf","school","calc","info","trophy"][i],20)+'</div><div style="flex:1"><div style="font-weight:600;font-family:var(--fh)">Cấp '+(i+1)+': '+esc(L.lv)+'</div><div class="muted">'+L.qs.length+' câu hỏi</div></div><button class="btn" style="width:auto;padding:9px 15px" onclick="startLevel('+i+')">Bắt đầu</button></div>';}).join("");
 var Q=S.quiz,L=QUIZ[Q.lv]; if(Q.done){var b=Q.score<=4?BADGES[0]:Q.score<=6?BADGES[1]:Q.score<=8?BADGES[2]:Q.score===9?BADGES[3]:BADGES[4];return '<div class="card" style="text-align:center;padding:26px"><div style="width:74px;height:74px;border-radius:50%;background:var(--gold-soft);color:var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 10px">'+ic(b.i,38)+'</div><h2 style="margin:0">'+esc(b.t)+'</h2><div class="muted" style="margin:6px 0 14px">Điểm: '+Q.score+'/'+L.qs.length+' · Cấp '+(Q.lv+1)+'</div><button class="btn" onclick="S.quiz=null;render()">Chọn cấp khác</button></div>';}

  var w=document.getElementById("toastwrap"); if(!w){ w=document.createElement("div"); w.id="toastwrap"; document.body.appendChild(w); }
  var clean=msg.replace(/^✅\s*/,"").replace(/^❌\s*/,"");
  var sym=type==="ok"?"✓":type==="err"?"!":"i";
  var t=document.createElement("div"); t.className="toast "+type;
  t.innerHTML='<span class="ti">'+sym+'</span><span class="tt"></span>';
  t.querySelector(".tt").textContent=clean;

  if(prod){ var e=EXTRA[prod.id]||{}; return '🥛 '+prod.name+' — '+prod.tag+'.\n👶 Đối tượng: '+prod.audience+'\n✨ Nổi bật: '+(prod.claims||[]).slice(0,2).join('; ')+(e.price?('\n💰 Giá tham khảo: '+fmtk(e.price)+'/lon'):'')+'\n👉 Mở tab Sản phẩm để xem thành phần, HSCB, hướng dẫn chốt sale.'; }
  for(var i=0;i<QA.length;i++){ if(deburr(QA[i].q+' '+(QA[i].tags||'')).indexOf(d)>=0) return '💬 '+QA[i].a; }

/* --- XLSX: OOXML đóng gói zip (store, không nén) --- */
function crc32(buf){ var t=crc32.t; if(!t){ t=crc32.t=[]; for(var n=0;n<256;n++){ var c=n; for(var k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } } var crc=0^(-1); for(var i=0;i<buf.length;i++) crc=(crc>>>8)^t[(crc^buf[i])&0xFF]; return (crc^(-1))>>>0; }
function zipStore(files){
 var chunks=[],central=[],offset=0;
 function u16(n){return [n&255,(n>>8)&255];} function u32(n){return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];}
 files.forEach(function(f){
  var name=new TextEncoder().encode(f.name), data=f.data, crc=crc32(data);
  var local=[0x50,0x4b,0x03,0x04].concat(u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
  chunks.push(new Uint8Array(local)); chunks.push(name); chunks.push(data);
  var cen=[0x50,0x4b,0x01,0x02].concat(u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
  central.push(new Uint8Array(cen)); central.push(name);
  offset+=local.length+name.length+data.length;
 });
 var cSize=0; central.forEach(function(c){cSize+=c.length;});
 var eocd=[0x50,0x4b,0x05,0x06].concat(u16(0),u16(0),u16(files.length),u16(files.length),u32(cSize),u32(offset),u16(0));
 var all=chunks.concat(central,[new Uint8Array(eocd)]); var total=0; all.forEach(function(a){total+=a.length;});
 var out=new Uint8Array(total),p=0; all.forEach(function(a){out.set(a,p);p+=a.length;}); return out;
}
function colRef(n){ var s=""; n++; while(n>0){ var m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function makeXlsx(aoa){
 function esx(s){ return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
 var rowsXml=aoa.map(function(row,ri){ var cells=row.map(function(v,ci){ return '<c r="'+colRef(ci)+(ri+1)+'" t="inlineStr"><is><t xml:space="preserve">'+esx(v)+'</t></is></c>'; }).join(""); return '<row r="'+(ri+1)+'">'+cells+'</row>'; }).join("");
 var enc=new TextEncoder();
 var sheet='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rowsXml+'</sheetData></worksheet>';
 var wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="KhachHang" sheetId="1" r:id="rId1"/></sheets></workbook>';
 var wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
 var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
 var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
 return zipStore([
  {name:"[Content_Types].xml",data:enc.encode(ct)},
  {name:"_rels/.rels",data:enc.encode(rels)},

 var i=0, ok=0;
 function next(){
  if(i>=pend.length){ lsSet(OQ_KEY,q); var b=el("ordpushbtn"); if(b){b.textContent="Đẩy đơn chờ";b.disabled=false;} if(ok>0)pushNotif("check","Đơn đã đồng bộ",ok+" đơn đã đẩy về hệ thống NPP."); if(!silent||ok>0)toast("Đã đẩy "+ok+"/"+pend.length+" đơn về hệ thống."+(ok<pend.length?" Đơn lỗi giữ lại thử sau.":"")); if(S.stockOpen)renderStock(); return; }
  var o=pend[i]; var body=Object.assign({client_id:(o.at||Date.now())+"_"+(o.sku||""), tenant:tn}, o);

<script>
/* Tự đồng bộ đơn về hệ thống NPP: khi mở app, khi có mạng lại, và mỗi 60s */
(function(){
  // Cap san Ma NPP qua link ?npp=<ma> (ban giao NPP khong phai go tay)
  try{ var usp=new URLSearchParams(location.search); var np=usp.get("npp"); var pgc=usp.get("pg"); var arc=usp.get("area");
    if(np){ np=np.trim(); localStorage.setItem("wt_tenant", JSON.stringify(np)); localStorage.setItem("wt_tenant_locked","1"); }
    if(pgc){ pgc=pgc.trim(); localStorage.setItem("wt_pg", JSON.stringify(pgc)); try{ if(window.S&&S.acc){ S.acc.name=pgc; } }catch(e){} }
    if(arc){ arc=arc.trim(); localStorage.setItem("wt_area", JSON.stringify(arc)); try{ if(window.S&&S.acc){ S.acc.area=arc; } }catch(e){} }
    if((np||pgc||arc)){ try{ history.replaceState(null,"",location.pathname+location.hash); if(typeof render==="function") render(); }catch(e){} }
  }catch(e){}
  function autoFlush(){ try{ if(typeof flushOrders==="function" && navigator.onLine) flushOrders(true); }catch(e){} }
  function autoStock(){ try{ if(typeof pullStockAuto==="function") pullStockAuto(); }catch(e){} }
  window.addEventListener("load",function(){ setTimeout(function(){ autoFlush(); autoStock(); },2500); });
  window.addEventListener("online",function(){ if(typeof toast==="function")toast("Đã có mạng — đang đồng bộ."); autoFlush(); autoStock(); });
  setInterval(function(){ autoFlush(); autoStock(); }, 60000);
})();
</script>
