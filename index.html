var STOCK_KEY="wt_stock_v1", STOCK_LOW=5;
function stockData(){ try{ return JSON.parse(localStorage.getItem(STOCK_KEY)||"null"); }catch(e){ return null; } }
function stockLevel(id){ var s=stockData(); if(!s||!s.items||s.items[id]==null) return null; return s.items[id]; }
function stockBadge(id,big){ var q=stockLevel(id); if(q==null) return ""; var c,t; if(q<=0){c="#DC2626";t="Hết hàng";} else if(q<=STOCK_LOW){c="#C2691A";t="Sắp hết ("+q+")";} else {c="#0F9A6A";t="Còn hàng";} return '<span class="stockb" style="background:'+c+'22;color:'+c+';'+(big?"font-size:12px;padding:4px 10px;":"")+'">'+t+'</span>'; }
function stockDec(id,qty){ var s=stockData(); if(!s||!s.items||s.items[id]==null) return false; s.items[id]=Math.max(0,s.items[id]-qty); s.at=Date.now(); try{ localStorage.setItem(STOCK_KEY,JSON.stringify(s)); }catch(e){} return true; }

function bumpConsult(rec){ var c=counters(); c.total=(c.total||0)+1; if(rec&&!rec.freeze&&rec.prods&&rec.prods.length) c.skus=(c.skus||0)+rec.prods.length; lsSet(CT_KEY,c); }
function bumpOrder(){ var c=counters(); c.orders=(c.orders||0)+1; lsSet(CT_KEY,c); }

/* ---------- MÃ HOÁ PHÍA PG ---------- */
var _pubKey=null;
function pubKey(){ if(_pubKey) return Promise.resolve(_pubKey); return crypto.subtle.importKey("spki",b64ToBuf(WT_PUB_B64),{name:"RSA-OAEP",hash:"SHA-256"},false,["encrypt"]).then(function(k){_pubKey=k;return k;}); }
function encSession(obj){
 return pubKey().then(function(pk){
  return crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt"]).then(function(aes){
   var iv=crypto.getRandomValues(new Uint8Array(12));
   var data=new TextEncoder().encode(JSON.stringify(obj));
   return crypto.subtle.encrypt({name:"AES-GCM",iv:iv},aes,data).then(function(ct){
    return crypto.subtle.exportKey("raw",aes).then(function(raw){
     return crypto.subtle.encrypt({name:"RSA-OAEP"},pk,raw).then(function(ek){
      return {ek:bufToB64(ek),iv:bufToB64(iv.buffer),ct:bufToB64(ct)};
     });});});});});
}
function saveSessionEnc(obj){
 if(!cryptoOK()) return Promise.reject(new Error("Trình duyệt không hỗ trợ mã hoá"));
 return encSession(obj).then(function(enc){
  var arr=lsGet(SS_KEY,[]); var id="S"+Date.now().toString(36)+Math.floor(Math.random()*46656).toString(36);
  enc.id=id; enc.t=Date.now(); arr.push(enc); lsSet(SS_KEY,arr); return id;
 });
}
function replaceSessionEnc(id,obj){
 return encSession(obj).then(function(enc){
  var arr=lsGet(SS_KEY,[]); for(var i=0;i<arr.length;i++){ if(arr[i].id===id){ enc.id=id; enc.t=arr[i].t; arr[i]=enc; break; } }
  lsSet(SS_KEY,arr);
 });
}

/* ---------- ADMIN: MỞ KHOÁ + GIẢI MÃ ---------- */
function deriveAesFromPass(pass,saltB64,usage){
 return crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]).then(function(bk){
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:new Uint8Array(b64ToBuf(saltB64)),iterations:200000,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,usage);
 });
}
function unwrapPkcs8(pass){
 var wk=getWK();
 return deriveAesFromPass(pass,wk.salt,["decrypt"]).then(function(aes){
  return crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(b64ToBuf(wk.iv))},aes,b64ToBuf(wk.wk));
 });
}
function adminPriv(pass){
 return unwrapPkcs8(pass).then(function(pkcs8){ return crypto.subtle.importKey("pkcs8",pkcs8,{name:"RSA-OAEP",hash:"SHA-256"},false,["decrypt"]); });
}
function decryptAll(priv){
 var arr=lsGet(SS_KEY,[]); var out=[]; var chain=Promise.resolve();
 arr.forEach(function(e){ chain=chain.then(function(){
  return crypto.subtle.decrypt({name:"RSA-OAEP"},priv,b64ToBuf(e.ek)).then(function(raw){
   return crypto.subtle.importKey("raw",raw,{name:"AES-GCM"},false,["decrypt"]).then(function(aes){
    return crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(b64ToBuf(e.iv))},aes,b64ToBuf(e.ct)).then(function(pt){
     var o=JSON.parse(new TextDecoder().decode(pt)); o._id=e.id; o._t=e.t; out.push(o);
    });});});
 }); });
 return chain.then(function(){ return out; });
}
function adminChangePass(oldP,newP){
 return unwrapPkcs8(oldP).then(function(pkcs8){
  var salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  return deriveAesFromPass(newP,bufToB64(salt.buffer),["encrypt"]).then(function(aes){
   return crypto.subtle.encrypt({name:"AES-GCM",iv:iv},aes,pkcs8).then(function(wrapped){
    lsSet(WK_KEY,{salt:bufToB64(salt.buffer),iv:bufToB64(iv.buffer),wk:bufToB64(wrapped)});
   });});});
}

/* --- XLSX: OOXML đóng gói zip (store, không nén) --- */
function crc32(buf){ var t=crc32.t; if(!t){ t=crc32.t=[]; for(var n=0;n<256;n++){ var c=n; for(var k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } } var crc=0^(-1); for(var i=0;i<buf.length;i++) crc=(crc>>>8)^t[(crc^buf[i])&0xFF]; return (crc^(-1))>>>0; }
function zipStore(files){
 var chunks=[],central=[],offset=0;
 function u16(n){return [n&255,(n>>8)&255];} function u32(n){return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];}
 files.forEach(function(f){
  var name=new TextEncoder().encode(f.name), data=f.data, crc=crc32(data);
  var local=[0x50,0x4b,0x03,0x04].concat(u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
  chunks.push(new Uint8Array(local)); chunks.push(name); chunks.push(data);
  var cen=[0x50,0x4b,0x01,0x02].concat(u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
  central.push(new Uint8Array(cen)); central.push(name);
  offset+=local.length+name.length+data.length;
 });
 var cSize=0; central.forEach(function(c){cSize+=c.length;});
 var eocd=[0x50,0x4b,0x05,0x06].concat(u16(0),u16(0),u16(files.length),u16(files.length),u32(cSize),u32(offset),u16(0));
 var all=chunks.concat(central,[new Uint8Array(eocd)]); var total=0; all.forEach(function(a){total+=a.length;});
 var out=new Uint8Array(total),p=0; all.forEach(function(a){out.set(a,p);p+=a.length;}); return out;
}
function colRef(n){ var s=""; n++; while(n>0){ var m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function makeXlsx(aoa){
 function esx(s){ return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
 var rowsXml=aoa.map(function(row,ri){ var cells=row.map(function(v,ci){ return '<c r="'+colRef(ci)+(ri+1)+'" t="inlineStr"><is><t xml:space="preserve">'+esx(v)+'</t></is></c>'; }).join(""); return '<row r="'+(ri+1)+'">'+cells+'</row>'; }).join("");
 var enc=new TextEncoder();
 var sheet='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rowsXml+'</sheetData></worksheet>';
 var wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="KhachHang" sheetId="1" r:id="rId1"/></sheets></workbook>';
 var wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
 var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
 var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
 return zipStore([
  {name:"[Content_Types].xml",data:enc.encode(ct)},
  {name:"_rels/.rels",data:enc.encode(rels)},
  {name:"xl/workbook.xml",data:enc.encode(wb)},
  {name:"xl/_rels/workbook.xml.rels",data:enc.encode(wbRels)},
  {name:"xl/worksheets/sheet1.xml",data:enc.encode(sheet)}
 ]);
}

  '<label style="margin-top:8px">Bridge Key (X-Bridge-Key)</label><input id="ord_key" value="'+esc(lsGet(BRIDGE_KEY_KEY,""))+'" placeholder="khoá chống lạm dụng"/>'+

  '<div class="faint" style="text-align:center;margin-top:12px;font-size:11px">Lên đơn trừ tồn cục bộ + xếp hàng đợi; khi có mạng đẩy về KiotViet qua cầu nối. Tồn nhập tay hoặc kéo từ KiotViet.</div></div></div>';
}

/* ---------- ĐẨY ĐƠN KIOTVIET (hàng đợi offline → cầu nối) ---------- */
var OQ_KEY="wt_order_queue", ORDER_URL_KEY="wt_order_url", BRIDGE_KEY_KEY="wt_bridge_key", TENANT_KEY="wt_tenant";
function orderQueue(){ return lsGet(OQ_KEY,[]); }
function pendingOrders(){ return orderQueue().filter(function(o){return !o.sent;}); }
function queueOrder(o){ var q=orderQueue(); q.push(o); lsSet(OQ_KEY,q); }
function flushOrders(){
 var url=lsGet(ORDER_URL_KEY,""); if(!url){ alert("Chưa cấu hình endpoint đẩy đơn KiotViet (cầu nối)."); return; }
 var q=orderQueue(), pend=q.filter(function(o){return !o.sent;});
 if(!pend.length){ alert("Không có đơn nào chờ đẩy."); return; }
 var key=lsGet(BRIDGE_KEY_KEY,""), tn=lsGet(TENANT_KEY,""), headers={"Content-Type":"application/json"}; if(key)headers["X-Bridge-Key"]=key; if(tn)headers["X-Tenant"]=tn;
 var btn=el("ordpushbtn"); if(btn){btn.textContent="Đang đẩy...";btn.disabled=true;}
 var i=0, ok=0;
 function next(){
  if(i>=pend.length){ lsSet(OQ_KEY,q); var b=el("ordpushbtn"); if(b){b.textContent="Đẩy đơn chờ";b.disabled=false;} alert("Đã đẩy "+ok+"/"+pend.length+" đơn về KiotViet."+(ok<pend.length?" Các đơn lỗi vẫn giữ trong hàng đợi để thử lại.":"")); if(S.stockOpen)renderStock(); return; }
  var o=pend[i];
  fetch(url,{method:"POST",headers:headers,body:JSON.stringify(o)}).then(function(r){ if(r.ok){o.sent=true;o.sentAt=Date.now();ok++;} }).catch(function(){}).then(function(){ i++; next(); });
 }
 next();
}

/* ---------- TRIGGER ẨN: #qtri hoặc gõ 7 lần dòng phiên bản ---------- */
var _adminTap=0,_adminTapT=0;
function adminTap(){ var now=Date.now(); if(now-_adminTapT>1500)_adminTap=0; _adminTapT=now; _adminTap++; if(_adminTap>=7){ _adminTap=0; if(typeof closeDrawer==="function")closeDrawer(); setTimeout(openAdmin,200); } }
function checkAdminHash(){ if(location.hash==="#qtri"||location.hash==="#admin"){ try{history.replaceState(null,"",location.pathname+location.search);}catch(e){} openAdmin(); } }
function checkDeepLink(){ var h=location.hash||""; if(h.indexOf("#sp=")===0){ var id=h.slice(4); if(typeof P==="function"&&P(id)){ S.openProd=id; S.tab="sanpham"; try{history.replaceState(null,"",location.pathname+location.search);}catch(e){} render(); window.scrollTo(0,0); } } }

/* ---------- CỔNG QUẢN TRỊ (UI) ---------- */
function openAdmin(){ S.adminOpen=true; S.adminAuthed=false; S.adminData=null; renderAdmin(); }
function closeAdmin(){ S.adminOpen=false; S.adminAuthed=false; S.adminData=null; var o=el("ovl"); if(o)o.innerHTML=""; }
function adminLogin(){
 var inp=el("admpass"); var pass=inp?inp.value:""; if(!pass){return;}
 var box=el("admerr"); if(box)box.textContent="";
 if(!cryptoOK()){ if(box)box.textContent="Trình duyệt không hỗ trợ mã hoá (cần HTTPS / trình duyệt mới)."; return; }
 var btn=el("admloginbtn"); if(btn){btn.textContent="Đang mở khoá...";btn.disabled=true;}
 adminPriv(pass).then(function(priv){ return decryptAll(priv); }).then(function(data){
  S.adminAuthed=true; S.adminData=data; renderAdmin();
 }).catch(function(e){ if(btn){btn.textContent="Mở khoá";btn.disabled=false;} var b=el("admerr"); if(b)b.textContent="Sai mật khẩu hoặc dữ liệu lỗi. Thử lại."; });
}
function adminDoChangePass(){
 var o=prompt("Nhập MẬT KHẨU HIỆN TẠI:"); if(o==null)return;
 var n=prompt("Nhập MẬT KHẨU MỚI (tối thiểu 6 ký tự):"); if(n==null)return; if(n.length<6){alert("Mật khẩu mới quá ngắn.");return;}
 adminChangePass(o,n).then(function(){ alert("✅ Đã đổi mật khẩu quản trị (lưu trên thiết bị này)."); }).catch(function(){ alert("Đổi mật khẩu thất bại — sai mật khẩu hiện tại?"); });
}
function adminWipe(){ if(confirm("XOÁ toàn bộ dữ liệu khách đã lưu mã hoá trên máy này?\nChỉ nên làm sau khi đã đồng bộ/lưu file an toàn.")){ localStorage.removeItem(SS_KEY); S.adminData=[]; renderAdmin(); } }
function renderAdmin(){
 var o=el("ovl"); if(!o)return;
 if(!S.adminOpen){o.innerHTML="";return;}
 var head='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span class="ico" style="background:#10357A;color:#fff;width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center">'+ic("lock",18)+'</span><div style="flex:1"><div style="font-weight:700;font-family:var(--fh);font-size:16px">Cổng Quản trị Isopharma</div><div class="faint" style="font-size:11.5px">Chỉ dành cho tài khoản quản trị</div></div><button class="btn ghost" style="width:auto;padding:8px" onclick="closeAdmin()">'+ic("x",18)+'</button></div>';
 if(!S.adminAuthed){
  var n=lsGet(SS_KEY,[]).length;
  o.innerHTML='<div class="modal" onclick="if(event.target===this)closeAdmin()"><div class="modal-c">'+head+
   '<div class="muted" style="margin-bottom:10px">Đang giữ <b>'+n+'</b> phiên tư vấn (mã hoá) trên thiết bị này. Nhập mật khẩu quản trị để mở & tải dữ liệu.</div>'+
   '<label>Mật khẩu quản trị</label><input id="admpass" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')adminLogin()"/>'+
   '<div id="admerr" style="color:#DC2626;font-size:12.5px;margin:6px 2px 0;min-height:16px"></div>'+
   '<button id="admloginbtn" class="btn" style="margin-top:10px" onclick="adminLogin()">'+ic("unlock",17)+'Mở khoá</button>'+
   '<div class="faint" style="text-align:center;margin-top:12px;font-size:11px">RBAC: tư vấn viên không thể mở dữ liệu này.</div>'+
   '</div></div>';
  setTimeout(function(){var i=el("admpass");if(i)i.focus();},60); return;
 }
 var rows=S.adminData||[]; var cfg=syncCfg();
 var preview=rows.slice(0,8).map(function(r){ return '<tr><td style="padding:6px 8px;border-bottom:1px solid var(--line)">'+esc(r.date)+'</td><td style="padding:6px 8px;border-bottom:1px solid var(--line)">'+esc(r.buyerName||"—")+'</td><td style="padding:6px 8px;border-bottom:1px solid var(--line)">'+esc(r.phone||"—")+'</td><td style="padding:6px 8px;border-bottom:1px solid var(--line)">'+esc(r.skuMain||(r.warn?"⚠ đóng băng":"—"))+'</td></tr>'; }).join("");
 o.innerHTML='<div class="modal" onclick="if(event.target===this)closeAdmin()"><div class="modal-c" style="max-width:520px">'+head+
  '<div style="display:flex;gap:10px;margin-bottom:12px"><div style="flex:1;background:var(--pri-soft);border-radius:12px;padding:11px;text-align:center"><div style="font-size:22px;font-weight:700;font-family:var(--fh);color:var(--pri)">'+rows.length+'</div><div class="faint" style="font-size:11px">Phiên đã lưu</div></div><div style="flex:1;background:#FFF1DC;border-radius:12px;padding:11px;text-align:center"><div style="font-size:22px;font-weight:700;font-family:var(--fh);color:#C2691A">'+rows.filter(function(r){return r.ordered;}).length+'</div><div class="faint" style="font-size:11px">Đã lên đơn</div></div></div>'+
  (rows.length?('<div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#F1F5F9;color:#475569"><th style="padding:7px 8px;text-align:left">Ngày</th><th style="padding:7px 8px;text-align:left">Khách</th><th style="padding:7px 8px;text-align:left">SĐT</th><th style="padding:7px 8px;text-align:left">SKU</th></tr></thead><tbody>'+preview+'</tbody></table>'+(rows.length>8?'<div class="faint" style="padding:7px 8px;font-size:11px;background:#F8FAFC">… và '+(rows.length-8)+' phiên nữa trong file tải về.</div>':"")+'</div>'):'<div class="muted" style="text-align:center;padding:18px">Chưa có phiên nào được lưu (khách chưa đồng ý lưu, hoặc chưa tư vấn).</div>')+
  '<div style="display:flex;gap:9px;margin-bottom:10px"><button class="btn sec" onclick="adminExportCSV()">'+ic("download",16)+'Tải CSV</button><button class="btn" onclick="adminExportXLSX()">'+ic("download",16)+'Tải XLSX</button></div>'+
  '<label style="margin-top:4px">Endpoint hệ thống Isopharma (URL đồng bộ — Odoo / Studio / CDP)</label><input id="syncurl" value="'+esc(cfg.url||"")+'" placeholder="https://...isopharma.../api/consultations" onchange="adminSaveSyncUrl(this.value)"/>'+
  '<div style="display:flex;gap:9px;margin-top:9px"><button class="btn ghost" style="flex:.7" onclick="adminSaveSyncUrl(el(\'syncurl\').value);alert(\'Đã lưu URL đồng bộ.\')">Lưu URL</button><button id="syncbtn" class="btn ok" onclick="adminSync()">'+ic("sync",16)+'Đồng bộ về hệ thống</button></div>'+
  '<button class="btn sec" style="margin-top:10px" onclick="openStock()">'+ic("pkg",16)+'Cập nhật tồn kho điểm bán</button>'+
  '<div style="display:flex;gap:9px;margin-top:14px;border-top:1px solid var(--line);padding-top:12px"><button class="btn ghost" style="font-size:12.5px" onclick="adminDoChangePass()">Đổi mật khẩu</button><button class="btn ghost" style="font-size:12.5px;color:#DC2626" onclick="adminWipe()">Xoá dữ liệu máy</button></div>'+
  '<div class="faint" style="text-align:center;margin-top:12px;font-size:11px">Dữ liệu được giải mã tạm trong phiên admin. Đóng cổng để xoá khỏi bộ nhớ.</div>'+
  '</div></div>';
}
try{ checkAdminHash(); checkDeepLink(); window.addEventListener("hashchange",function(){checkAdminHash();checkDeepLink();}); }catch(e){}
</script>
